<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C5CFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#0A0B14"/>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#gradient)" stroke-width="3" opacity="0.8"/>
  
  <!-- Inner bracket symbol -->
  <text x="50" y="64" font-family="'Courier New', monospace" font-size="38" font-weight="700" 
        fill="url(#gradient)" text-anchor="middle" dominant-baseline="middle">
    &lt;/&gt;
  </text>
</svg>